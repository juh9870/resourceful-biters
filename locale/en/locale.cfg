[mod-name]
internal-mod-name=Resourceful Biters

[mod-description]
internal-mod-name=Obtain resources by mining corpses of your enemies\nBiters ate all resources on Nauvis. Pentapods just couldn't get enough of that stone on Gleba. Demolishers metabolized all of Vulcanus patches. TAKE THEM BACK!


[mod-setting-name]
resourceful-biters-enemy-resources-per-hp=Resources multiplier (enemy entities)
resourceful-biters-neutral-resources-per-hp=Resources multiplier (neutral entities)
resourceful-biters-player-resources-per-hp=Resources multiplier (player entities)
resourceful-biters-enemy-drops-resources=Enemy entities drop resources
resourceful-biters-neutral-drops-resources=Neutral entities drop resources
resourceful-biters-player-drops-resources=Player structures drop resources
resourceful-biters-remove-resource-generation=Remove natural resources generation

[mod-setting-description]
resourceful-biters-enemy-resources-per-hp=Multiplier to the amount of resources placed on death by enemy entities
resourceful-biters-neutral-resources-per-hp=Multiplier to the amount of resources placed on death by neutral entities
resourceful-biters-player-resources-per-hp=Multiplier to the amount of resources placed on death by player structures and entities
resourceful-biters-enemy-drops-resources=Whenever enemy entities (biters, demolishers, etc.) place resource patches when destroyed
resourceful-biters-neutral-drops-resources=Whenever neutral entities (trees, rocks) place resource patches when destroyed (not mined)
resourceful-biters-player-drops-resources=Whenever player structures and entities drop resources when destroyed
resourceful-biters-remove-resource-generation=Removes all supported resources form map generation, making biter farming the only source of resources